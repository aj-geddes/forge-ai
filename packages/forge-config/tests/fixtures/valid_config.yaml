metadata:
  name: test-forge
  version: "0.1.0"
  description: "Test configuration"
  environment: testing

llm:
  default_model: gpt-4o
  temperature: 0.5
  max_tokens: 2048
  litellm:
    mode: embedded
    model_list:
      - model_name: gpt-4o
        litellm_params:
          model: openai/gpt-4o

tools:
  manual:
    - name: echo
      description: "Echo back the input"
      parameters:
        - name: message
          type: string
          description: "Message to echo"
          required: true
      api:
        url: "https://httpbin.org/post"
        method: POST
        body_template:
          text: "{{ message }}"
        response_mapping:
          result_path: "$.json"

security:
  agentweave:
    enabled: false
  rate_limit_rpm: 100

agents:
  default: assistant
  agents:
    - name: assistant
      description: "Test assistant"
      max_turns: 5
