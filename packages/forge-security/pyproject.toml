[project]
name = "forge-security"
version = "0.1.0"
description = "AgentWeave integration wrapper for Forge AI"
requires-python = ">=3.12"
license = {text = "Apache-2.0"}
dependencies = [
    "forge-config",
    "agentweave",
    "cryptography>=44.0",
    "python-jose[cryptography]>=3.3",
    "structlog>=24.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/forge_security"]
