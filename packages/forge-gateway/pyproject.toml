[project]
name = "forge-gateway"
version = "0.1.0"
description = "FastAPI dual interface (REST + MCP + A2A) for Forge AI"
requires-python = ">=3.12"
license = {text = "Apache-2.0"}
dependencies = [
    "forge-config",
    "forge-security",
    "forge-agent",
    "fastapi>=0.115",
    "uvicorn[standard]>=0.34",
    "prometheus-client>=0.21",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/forge_gateway"]
