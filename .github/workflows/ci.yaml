name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  # Ensure agentweave is available as a sibling directory
  AGENTWEAVE_SETUP: |
    git clone --depth 1 https://github.com/aj-geddes/agentweave.git ../agentweave

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: ${{ env.AGENTWEAVE_SETUP }}
      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
      - run: uv sync --frozen
      - run: uv run ruff check .
      - run: uv run ruff format --check .

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: ${{ env.AGENTWEAVE_SETUP }}
      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
      - run: uv sync --frozen
      - run: uv run mypy packages/

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: ${{ env.AGENTWEAVE_SETUP }}
      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
      - run: uv sync --frozen
      - run: uv run pytest --cov=packages --cov-report=xml -v
      - uses: codecov/codecov-action@v4
        if: always()
        with:
          file: coverage.xml

  ui-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: cd packages/forge-ui && npm ci
      - run: cd packages/forge-ui && npm run lint
      - run: cd packages/forge-ui && npm run typecheck

  ui-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: cd packages/forge-ui && npm ci
      - run: cd packages/forge-ui && npm run test -- --run

  helm-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - run: helm lint deploy/helm/forge/
      - run: helm lint deploy/helm/forge/ -f deploy/helm/forge/values.prod.yaml
      - run: helm lint deploy/helm/forge/ -f deploy/helm/forge/values.dev.yaml

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: forge-ai
      - run: git clone --depth 1 https://github.com/aj-geddes/agentweave.git agentweave
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: forge-ai/Dockerfile
          push: false
          tags: forge:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
