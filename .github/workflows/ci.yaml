name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: aj-geddes/agentweave
          path: ../agentweave
      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
      - run: uv sync --frozen
      - run: uv run ruff check .
      - run: uv run ruff format --check .

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: aj-geddes/agentweave
          path: ../agentweave
      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
      - run: uv sync --frozen
      - run: uv run mypy packages/

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: aj-geddes/agentweave
          path: ../agentweave
      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
      - run: uv sync --frozen
      - run: uv run pytest --cov=packages --cov-report=xml -v
      - uses: codecov/codecov-action@v4
        if: always()
        with:
          file: coverage.xml

  helm-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - run: helm lint deploy/helm/forge/
      - run: helm lint deploy/helm/forge/ -f deploy/helm/forge/values.prod.yaml
      - run: helm lint deploy/helm/forge/ -f deploy/helm/forge/values.dev.yaml

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: forge-ai
      - uses: actions/checkout@v4
        with:
          repository: aj-geddes/agentweave
          path: agentweave
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: forge-ai/Dockerfile
          push: false
          tags: forge:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
