{{- if eq .Values.litellm.mode "dedicated" }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "forge.fullname" . }}-litellm
  labels:
    {{- include "forge.labels" . | nindent 4 }}
    app.kubernetes.io/component: litellm
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "forge.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: litellm
  template:
    metadata:
      labels:
        {{- include "forge.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: litellm
    spec:
      securityContext:
        runAsNonRoot: true
      containers:
        - name: litellm
          image: "{{ .Values.litellm.image.repository }}:{{ .Values.litellm.image.tag }}"
          ports:
            - name: http
              containerPort: 4000
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: http
          readinessProbe:
            httpGet:
              path: /health
              port: http
          resources:
            {{- toYaml .Values.litellm.resources | nindent 12 }}
          {{- if .Values.secrets }}
          envFrom:
            - secretRef:
                name: {{ include "forge.fullname" . }}-secrets
          {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "forge.fullname" . }}-litellm
  labels:
    {{- include "forge.labels" . | nindent 4 }}
    app.kubernetes.io/component: litellm
spec:
  type: ClusterIP
  ports:
    - port: 4000
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "forge.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: litellm
{{- end }}
